<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>[DEBUG] 내 강의 상세</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      line-height: 1.6;
    }

    .label {
      color: #888;
      font-size: 12px;
    }

    .value {
      font-weight: bold;
    }

    .section {
      border: 1px solid #ddd;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 4px;
    }

    .done {
      color: #16A34A;
      font-weight: bold;
    }

    .todo {
      color: #999;
    }

    table {
      border-collapse: collapse;
      margin-top: 8px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px 12px;
      text-align: left;
    }

    th {
      background: #f5f5f5;
    }
  </style>
</head>
<body>
<h1>⚠️ 디버그 뷰 (PR 머지 전 임시)</h1>

<div class="section">
  <h2>강의 정보</h2>
  <div><span class="label">ID:</span> <span class="value" th:text="${course.id}"></span></div>
  <div><span class="label">제목:</span> <span class="value" th:text="${course.title}"></span></div>
  <div><span class="label">강사:</span> <span class="value" th:text="${course.instructorName}"></span>
  </div>
  <div><span class="label">설명:</span> <span th:text="${course.description}"></span></div>
  <div><span class="label">진도율:</span> <span class="value"
                                             th:text="${course.progressRate} + '%'"></span></div>
</div>

<div class="section">
  <h2>콘텐츠 목록 (<span th:text="${#lists.size(course.contents)}"></span>개)</h2>
  <table>
    <thead>
    <tr>
      <th>순서</th>
      <th>ID</th>
      <th>제목</th>
      <th>완료 여부</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="content : ${course.contents}">
      <td th:text="${content.orderIndex}"></td>
      <td th:text="${content.id}"></td>
      <td th:text="${content.title}"></td>
      <td>
        <span th:if="${content.completed}" class="done">✅ 완료</span>
        <span th:unless="${content.completed}" class="todo">⬜ 미완료</span>
      </td>
    </tr>
    </tbody>
  </table>
</div>

<hr>
<p style="color:#999; font-size:12px;">
  이 페이지는 백엔드 동작 확인용 임시 뷰입니다. 실제 뷰는 <code>course/member/detail.html</code>에서 별도 작업 중입니다.
</p>
</body>
</html>
