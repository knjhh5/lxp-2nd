<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${course.title} + ' - LXP 학습 플랫폼'">강의 상세 - LXP 학습 플랫폼</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/course.css}">
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main>
  <div class="course-detail-wrap">
    <!-- 뒤로 가기 -->
    <a class="btn-back" th:href="@{/courses}">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15"
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      뒤로 가기
    </a>

    <!-- 강의 정보 카드 -->
    <div class="course-detail-card">
      <!-- 썸네일 -->
      <div class="course-detail-thumbnail">
        <img th:if="${course.thumbnailUrl != null}"
             th:src="${course.thumbnailUrl}"
             th:alt="${course.title}">
        <svg th:if="${course.thumbnailUrl == null}"
             xmlns="http://www.w3.org/2000/svg" width="64" height="64"
             viewBox="0 0 24 24" fill="none" stroke="#1D6EF5"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        </svg>
      </div>

      <!-- 강의 정보 -->
      <div class="course-detail-info">
        <div class="course-detail-info-top">
          <h1 class="course-detail-title" th:text="${course.title}">강의 제목</h1>
          <!-- 수강신청 버튼 (비로그인 또는 미수강 상태) -->
          <form th:action="@{/enrollments}" method="post">
            <input type="hidden" name="courseId" th:value="${course.id}">
            <button type="submit" class="btn-enroll">수강 신청</button>
          </form>
        </div>
        <div class="course-detail-instructor" th:text="${course.instructorName} + ' 강사'">강사명</div>
        <div class="course-detail-desc" th:text="${course.description}">강의 설명</div>
        <div class="course-detail-meta">
          <div class="course-meta-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span th:text="${course.enrollCount} + '명 수강 중'">0명 수강 중</span>

          <div class="course-meta-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
            </svg>
            <span>정원:
                                <span th:text="${course.enrollCount} + ' / ' + ${course.maxCapacity}">0 / 0</span>
                            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- 커리큘럼 -->
    <div class="curriculum-card">
      <div class="curriculum-title">커리큘럼</div>
      <ul class="curriculum-list">
        <li class="curriculum-item" th:each="content, stat : ${course.contents}">
          <div class="curriculum-item-left">
            <!-- 미수강 상태 아이콘 -->
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polygon points="10 8 16 12 10 16 10 8"></polygon>
            </svg>
            <div class="curriculum-item-info">
                                <span class="curriculum-item-name">
                                    <span>th:text="'#' + ${stat.index + 1} + ' ' + ${content.contentTitle}">강의명</span>
                                </span>
            </div>
          </div>
        </li>
      </ul>
    </div>
  </div>
</main>
</body>
</html>
