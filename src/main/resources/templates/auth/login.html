<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>로그인 - LXP 학습 플랫폼</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main>
  <div class="auth-card">

    <div class="auth-icon">
      <svg fill="none" height="26" stroke="#1D6EF5" stroke-width="2"
           viewBox="0 0 24 24" width="26" xmlns="http://www.w3.org/2000/svg">
        <path
            d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"
            stroke-linecap="round"
            stroke-linejoin="round"/>
      </svg>
    </div>

    <h1 class="auth-title">로그인</h1>
    <p class="auth-subtitle">LXP 학습 플랫폼에 오신 것을 환영합니다</p>

    <form method="post" th:action="@{/auth/login}">
      <div class="form-group">
        <label class="form-label" for="username">아이디</label>
        <input autocomplete="username" class="form-input" id="username" name="loginId"
               placeholder="아이디를 입력하세요" type="text"/>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">비밀번호</label>
        <input autocomplete="current-password" class="form-input" id="password" name="password"
               placeholder="비밀번호를 입력하세요" type="password"/>
      </div>

      <!-- 로그인 실패 시에만 표시 (?error 파라미터) -->
      <div class="alert-error" th:if="${errorMessage}">
        <svg fill="none" height="16" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round"
                stroke-linejoin="round"/>
        </svg>
        <span th:text="${errorMessage}"></span>
      </div>

      <button class="btn-submit" type="submit">로그인</button>
    </form>

    <p class="auth-footer-link">
      계정이 없으신가요? <a th:href="@{/auth/signup}">회원가입</a>
    </p>

  </div>
</main>

</body>
</html>
