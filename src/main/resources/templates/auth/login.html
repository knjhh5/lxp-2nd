<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - LXP 학습 플랫폼</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main>
  <div class="auth-card">

    <div class="auth-icon">
      <svg width="26" height="26" xmlns="http://www.w3.org/2000/svg" fill="none"
           viewBox="0 0 24 24" stroke="#1D6EF5" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
      </svg>
    </div>

    <h1 class="auth-title">로그인</h1>
    <p class="auth-subtitle">LXP 학습 플랫폼에 오신 것을 환영합니다</p>

    <form th:action="@{/auth/login}" method="post">
      <div class="form-group">
        <label class="form-label" for="username">아이디</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="아이디를 입력하세요" autocomplete="username" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">비밀번호</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
      </div>

      <!-- 로그인 실패 시에만 표시 (?error 파라미터) -->
      <div class="alert-error" th:if="${errorMessage}">
        <svg width="16" height="16" xmlns="http://www.w3.org/2000/svg" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>아이디 또는 비밀번호가 일치하지 않습니다</span>
      </div>

      <button type="submit" class="btn-submit">로그인</button>
    </form>

    <p class="auth-footer-link">
      계정이 없으신가요? <a th:href="@{/auth/signup}">회원가입</a>
    </p>

  </div>
</main>

</body>
</html>
