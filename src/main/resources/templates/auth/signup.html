<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>회원가입 - LXP 학습 플랫폼</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main>
  <div class="auth-card">

    <div class="auth-icon">
      <svg fill="none" height="26" stroke="#1D6EF5" stroke-width="2"
           viewBox="0 0 24 24" width="26" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" stroke-linecap="round"
              stroke-linejoin="round"/>
      </svg>
    </div>

    <h1 class="auth-title">회원가입</h1>
    <p class="auth-subtitle">새로운 계정을 만들어보세요</p>

    <form method="post" th:action="@{/auth/signup}">
      <div class="form-group">
        <label class="form-label" for="username">
          아이디 <span class="required">*</span>
        </label>
        <input autocomplete="username" class="form-input" id="username" name="loginId"
               placeholder="아이디를 입력하세요"
               th:value="${username}"
               type="text"/>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          비밀번호 <span class="required">*</span>
        </label>
        <input autocomplete="new-password" class="form-input" id="password" name="password"
               placeholder="8자 이상, 영문+숫자 포함"
               type="password"/>
        <p class="form-hint">8자 이상, 영문과 숫자를 포함해야 합니다</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="nickname">
          닉네임 <span class="required">*</span>
        </label>
        <input class="form-input" id="nickname" name="nickname" placeholder="닉네임을 입력하세요"
               th:value="${nickname}"
               type="text"/>
      </div>

      <!-- 회원가입 실패 시에만 표시 (Controller에서 model에 errorMessage 담아서 전달) -->
      <div class="alert-error" th:if="${errorMessage}">
        <svg fill="none" height="16" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round"
                stroke-linejoin="round"/>
        </svg>
<!--        <span th:text="${errorMessage}">에러 메시지 올 자리</span>-->
        <span th:text="${errorMessage}">에러 메시지 올 자리</span>
      </div>

      <button class="btn-submit" type="submit">회원가입</button>
    </form>

    <p class="auth-footer-link">
      이미 계정이 있으신가요? <a th:href="@{/auth/login}">로그인</a>
    </p>

  </div>
</main>

</body>
</html>
