<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${course.title} + ' - LXP 학습 플랫폼'">강의 상세 - LXP 학습 플랫폼</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/course.css}">
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main>
  <div class="course-detail-wrap">
    <!-- 뒤로 가기 -->
    <a class="btn-back" th:href="@{/courses}">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15"
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      뒤로 가기
    </a>

    <!-- 강의 정보 카드 -->
    <div class="course-detail-card">
      <!-- 썸네일 (placeholder) -->
      <div class="course-detail-thumbnail">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"
             viewBox="0 0 24 24" fill="none" stroke="#1D6EF5"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        </svg>
      </div>

      <!-- 강의 정보 -->
      <div class="course-detail-info">
        <div class="course-detail-info-top">
          <h1 class="course-detail-title" th:text="${course.title}">강의 제목</h1>
          <!-- 수강 신청 버튼 -->
          <form th:action="@{/courses/{id}/enroll(id=${course.id})}" method="post">
            <button type="submit" class="btn-enroll">수강 신청</button>
          </form>
        </div>
        <div class="course-detail-instructor"
             th:text="${course.instructorName} + ' 강사'">강사명
        </div>
        <div class="course-detail-desc" th:text="${course.description}">강의 설명</div>
      </div>
    </div>

    <!-- 커리큘럼 -->
    <div class="curriculum-card">
      <div class="curriculum-title">커리큘럼</div>
      <ul class="curriculum-list" th:if="${!#lists.isEmpty(course.contents)}">
        <li class="curriculum-item" th:each="content : ${course.contents}">
          <div class="curriculum-item-left">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polygon points="10 8 16 12 10 16 10 8"></polygon>
            </svg>
            <div class="curriculum-item-info">
                            <span class="curriculum-item-name">
                                <span
                                    th:text="'#' + ${content.orderIndex} + ' ' + ${content.contentTitle}">강의명</span>
                            </span>
            </div>
          </div>
        </li>
      </ul>
      <p th:if="${#lists.isEmpty(course.contents)}"
         style="color: var(--color-text-muted); font-size: 14px;">
        등록된 콘텐츠가 없습니다.
      </p>
    </div>
  </div>
</main>
</body>
</html>
